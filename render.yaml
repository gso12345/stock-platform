services:
  - type: web
    name: stock-platform-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stock-platform-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FINNHUB_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://stock-platform-one.vercel.app

databases:
  - name: stock-platform-db
    plan: free
    region: singapore

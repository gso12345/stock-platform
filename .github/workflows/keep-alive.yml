name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다 실행
  workflow_dispatch:        # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend and warm cache
        run: |
          curl -f https://stock-platform-ksmu.onrender.com/health
          echo "Backend is alive"
          curl -s "https://stock-platform-ksmu.onrender.com/api/v1/dashboard/kr" -o /dev/null
          curl -s "https://stock-platform-ksmu.onrender.com/api/v1/dashboard/us" -o /dev/null
          curl -s "https://stock-platform-ksmu.onrender.com/api/v1/dashboard/news/kr" -o /dev/null
          curl -s "https://stock-platform-ksmu.onrender.com/api/v1/dashboard/news/us" -o /dev/null
          echo "Cache warmed up"
